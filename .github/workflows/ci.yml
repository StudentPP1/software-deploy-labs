name: CI

"on":
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Checkstyle - Java source
        working-directory: mywebapp
        run: |
          chmod +x gradlew
          ./gradlew checkstyleMain checkstyleTest

      - name: Hadolint - Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: mywebapp/Dockerfile

      - name: ShellCheck - shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './mywebapp/scripts'

      - name: Yamllint - YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: >-
            mywebapp/docker-compose.yml
            mywebapp/docker-compose.prod.yml
            mywebapp/src/main/resources/application.yml
            .github/workflows/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
              truthy:
                allowed-values: ['true', 'false', 'on']
              document-start:
                present: false
              new-line-at-end-of-file: disable

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests with coverage
        working-directory: mywebapp
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload coverage report artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: mywebapp/build/reports/jacoco/test/html/
          retention-days: 30

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: mywebapp
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Target Node
    runs-on: self-hosted
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Encode configs to base64
        id: configs
        run: |
          NGINX_B64=$(base64 -w 0 mywebapp/nginx/default.conf)
          COMPOSE_B64=$(base64 -w 0 mywebapp/docker-compose.prod.yml)
          echo "nginx_b64=${NGINX_B64}" >> "$GITHUB_OUTPUT"
          echo "compose_b64=${COMPOSE_B64}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USER }}
          password: ${{ secrets.TARGET_PASSWORD }}
          script: |
            set -e

            mkdir -p /opt/mywebapp/nginx
            mkdir -p ~/.docker
            echo '{"auths":{}}' > ~/.docker/config.json

            echo "${{ steps.configs.outputs.nginx_b64 }}" \
              | base64 -d > /opt/mywebapp/nginx/default.conf

            echo "${{ steps.configs.outputs.compose_b64 }}" \
              | base64 -d > /opt/mywebapp/docker-compose.yml

            echo "${{ secrets.GHCR_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            echo "MYWEBAPP_IMAGE=ghcr.io/${REPO}:${{ github.ref_name }}" \
              > /opt/mywebapp/.env

            cd /opt/mywebapp
            docker compose pull mywebapp
            docker compose down || true
            docker compose up -d

            echo "Waiting for containers to start..."
            sleep 20

            echo "Deploy done: ghcr.io/${REPO}:${{ github.ref_name }}"

  verify:
    name: Verify Deployment
    runs-on: self-hosted
    needs: [deploy]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Verify Deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USER }}
          password: ${{ secrets.TARGET_PASSWORD }}
          script: |
            set -e

            echo "[1/7] Checking systemd service is active..."
            sudo systemctl is-active --quiet mywebapp \
              && echo "     OK: mywebapp.service is active" \
              || { echo "     FAIL: mywebapp.service is not active"; sudo systemctl status mywebapp; exit 1; }

            echo "[2/7] Checking all containers are running..."
            for container in mariadb_db mywebapp nginx; do
              docker ps --filter "name=${container}" --filter "status=running" | grep -q "${container}" \
                && echo "     OK: ${container} is running" \
                || { echo "     FAIL: ${container} is not running"; docker ps -a; exit 1; }
            done

            echo "[3/7] Checking app health/alive endpoint directly..."
            curl --silent --fail --max-time 10 http://localhost:5000/health/alive \
              && echo "     OK: /health/alive responded" \
              || { echo "     FAIL: /health/alive not responding"; exit 1; }

            echo "[4/7] Checking app health/ready endpoint directly..."
            curl --silent --fail --max-time 15 http://localhost:5000/health/ready \
              && echo "     OK: /health/ready responded" \
              || { echo "     FAIL: /health/ready not responding"; exit 1; }

            echo "[5/7] Checking nginx proxies / correctly..."
            HTTP_CODE=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 10 http://localhost:80/)
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "     OK: nginx returns HTTP ${HTTP_CODE} for /"
            else
              echo "     FAIL: nginx returned HTTP ${HTTP_CODE} for /"
              exit 1
            fi

            echo "[6/7] Checking nginx blocks /health endpoints (should return 403)..."
            HEALTH_CODE=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 10 http://localhost:80/health/ready)
            if [ "$HEALTH_CODE" -eq 403 ]; then
              echo "     OK: nginx blocks /health/ready with 403"
            else
              echo "     FAIL: nginx should return 403 for /health/ready, got ${HEALTH_CODE}"
              exit 1
            fi

            echo "[7/7] Checking nginx access log is being written..."
            LOG_LINES=$(docker exec mywebapp-nginx-1 \
              sh -c "wc -l < /var/log/nginx/mywebapp_access.log 2>/dev/null || echo 0")
            if [ "$LOG_LINES" -gt 0 ]; then
              echo "     OK: nginx access log has ${LOG_LINES} lines"
            else
              echo "     FAIL: nginx access log is empty or missing"
              exit 1
            fi

            echo ""
            echo "All checks passed! Deployment verified successfully."
