services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: simple_inventory
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - backend
    # healthcheck copy from: https://mariadb.com/docs/server/server-management/automated-mariadb-deployment-and-administration/docker-and-mariadb/using-healthcheck-sh
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  mywebapp:
    build: .
    container_name: mywebapp
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SERVER_PORT: 5000
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/simple_inventory
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "5000:5000"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:5000/health/ready" ]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      mywebapp:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - backend

networks:
  backend:
    driver: bridge